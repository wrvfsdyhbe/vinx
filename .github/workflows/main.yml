name: Python application static analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Установка Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Установка линтера Flake8
      run: pip install flake8

    - name: Проверка качества кода (Статический анализ)
      run: |
        # Первое: проверка на критические ошибки (Синтаксические ошибки)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
        # Второе: проверка на стилистические ошибки (соответствие PEP 8)
        # --exit-zero позволяет пайплайну продолжаться даже при наличии предупреждений
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
